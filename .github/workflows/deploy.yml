name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # The book is rendered from karalang/kara at deploy time; rebuild daily
    # so book edits pushed there reach the site without a website push.
    - cron: '17 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Kāra Book lives in the compiler repo (source of truth, next to
      # the code it documents). Render it into public/ so Astro ships it
      # verbatim at /book/.
      - name: Checkout compiler repo (book source)
        uses: actions/checkout@v4
        with:
          repository: karalang/kara
          path: kara
          sparse-checkout: docs/book

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build the book into public/book
        run: mdbook build kara/docs/book -d "$GITHUB_WORKSPACE/public/book"

      - uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
